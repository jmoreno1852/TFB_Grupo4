services:
  api:
    build: .
    container_name: api
    env_file:
      - .env
    ports:
      - "8000:8000" #Puerto uvicorn?
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data: